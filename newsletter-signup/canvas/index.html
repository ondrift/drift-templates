<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stay in the loop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    h1 span { color: #60a5fa; }

    p.sub {
      color: #888;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .form-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    input[type="text"], input[type="email"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #60a5fa; }

    button {
      background: #60a5fa;
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover { background: #93c5fd; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #555; cursor: not-allowed; }

    .note {
      color: #555;
      font-size: 0.8rem;
      margin-top: 0.75rem;
    }

    .message {
      margin-top: 1.25rem;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }
    .message.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .message.error   { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .message.show    { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Newsletter</div>
    <h1>Stay <span>in the loop</span></h1>
    <p class="sub">
      Join our newsletter for updates, tips, and the occasional interesting thing.
      No spam. Unsubscribe anytime.
    </p>

    <form id="signup-form" novalidate>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="Your name (optional)"
        autocomplete="name"
        style="width:100%;margin-bottom:0.5rem"
      />
      <div class="form-row">
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
        <button type="submit" id="submit-btn">Subscribe</button>
      </div>
    </form>

    <p class="note">
      By subscribing you agree to receive occasional emails from us.
      <a href="#" id="unsub-link" style="color:#555;text-decoration:underline">Unsubscribe</a>
    </p>

    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('signup-form');
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('message');

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = 'message show ' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const name  = document.getElementById('name').value.trim();

      if (!email) { showMessage('Please enter your email address.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Subscribing…';

      try {
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, name }),
        });
        const data = await res.json();

        if (res.ok) {
          showMessage(data.payload?.message ?? 'You\'re subscribed!', 'success');
          form.reset();
        } else if (res.status === 409) {
          showMessage('This email is already subscribed.', 'error');
        } else {
          showMessage(data.payload?.error ?? 'Something went wrong. Please try again.', 'error');
        }
      } catch {
        showMessage('Could not reach the server. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Subscribe';
      }
    });

    // Inline unsubscribe prompt
    document.getElementById('unsub-link').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt('Enter your email to unsubscribe:');
      if (!email) return;
      const res = await fetch('/api/unsubscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      showMessage(data.payload?.message ?? 'Unsubscribed.', res.ok ? 'success' : 'error');
    });
  </script>
</body>
</html>
