name: my-portfolio
atomic:
  - dir: ./atomic/get-projects
  - dir: ./atomic/inquiry
  - dir: ./atomic/notify-inquiry
backbone:
  cache:
    - key: projects
      file: ./backbone/projects.json
  nosql:
    - collection: inquiries
  queues:
    - name: inquiry-queue
  secrets:
    - key: RESEND_API_KEY
      env: RESEND_API_KEY
    - key: SENDER_EMAIL
      env: SENDER_EMAIL
    - key: OWNER_NAME
      value: "Jane Developer"
    - key: OWNER_EMAIL
      env: OWNER_EMAIL
canvas:
  - dir: ./canvas
