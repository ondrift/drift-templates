<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book an Appointment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f9fb;
      --card: #ffffff;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --muted: #64748b;
      --success-bg: #f0fdf4; --success-text: #166534; --success-border: #bbf7d0;
      --error-bg: #fef2f2;   --error-text: #991b1b;  --error-border: #fecaca;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ─── Header ─── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 3rem 2rem 2.5rem;
      text-align: center;
    }
    header h1 { font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; margin-bottom: 0.5rem; }
    header p  { opacity: 0.85; font-size: 1rem; max-width: 460px; margin: 0 auto; }

    /* ─── Layout ─── */
    .page { max-width: 740px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }

    /* ─── Steps ─── */
    .steps { display: flex; gap: 0; margin-bottom: 2.5rem; }
    .step {
      flex: 1; text-align: center; padding: 0.6rem 0;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--muted); border-bottom: 3px solid var(--border);
      transition: color 0.2s, border-color 0.2s;
    }
    .step.active   { color: var(--primary); border-color: var(--primary); }
    .step.done     { color: var(--primary); border-color: var(--primary); opacity: 0.5; }

    /* ─── Date picker ─── */
    label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    input, select {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.7rem 0.9rem; font-size: 0.95rem; color: var(--text);
      background: var(--bg); outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--primary); }
    .field { margin-bottom: 1.1rem; }

    /* ─── Slot grid ─── */
    #slot-section { display: none; }
    .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.6rem; margin-top: 0.75rem; }
    .slot-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.6rem 0; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      text-align: center; color: var(--text); transition: all 0.15s;
    }
    .slot-btn:hover  { border-color: var(--primary); color: var(--primary); }
    .slot-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    #slot-loading { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }

    /* ─── Contact form ─── */
    #contact-section { display: none; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 520px) { .two-col { grid-template-columns: 1fr; } }

    /* ─── Buttons ─── */
    .btn {
      background: var(--primary); border: none; border-radius: 8px;
      color: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 600;
      padding: 0.8rem 1.5rem; transition: background 0.2s;
    }
    .btn:hover    { background: var(--primary-hover); }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); cursor: pointer;
      font-size: 0.9rem; padding: 0.7rem 1.2rem; transition: border-color 0.2s;
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }

    /* ─── Summary ─── */
    #summary-section { display: none; }
    .summary-line { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .summary-line:last-child { border-bottom: none; }
    .summary-line .lbl { color: var(--muted); }

    /* ─── Messages ─── */
    .msg { margin-top: 1rem; padding: 0.85rem 1rem; border-radius: 8px; font-size: 0.875rem; display: none; }
    .msg.success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
    .msg.error   { background: var(--error-bg);   color: var(--error-text);   border: 1px solid var(--error-border); }
    .msg.show    { display: block; }

    footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 2rem; }
  </style>
</head>
<body>

<header>
  <h1>Book an Appointment</h1>
  <p>Pick a date, choose a time, and we'll confirm your slot instantly.</p>
</header>

<div class="page">
  <div class="steps">
    <div class="step active" id="step-1">1 · Service &amp; Date</div>
    <div class="step" id="step-2">2 · Time Slot</div>
    <div class="step" id="step-3">3 · Your Details</div>
    <div class="step" id="step-4">4 · Confirm</div>
  </div>

  <div class="card">

    <!-- Step 1: service + date -->
    <div id="date-section">
      <div class="field">
        <label for="svc-select">Service</label>
        <select id="svc-select">
          <option value="Consultation">Consultation</option>
          <option value="Follow-up">Follow-up</option>
          <option value="Full session">Full session</option>
        </select>
      </div>
      <div class="field">
        <label for="date-input">Date</label>
        <input type="date" id="date-input" required />
      </div>
      <div class="btn-row" style="justify-content:flex-end">
        <button class="btn" id="date-next-btn">Next →</button>
      </div>
    </div>

    <!-- Step 2: slot picker -->
    <div id="slot-section">
      <p style="font-size:0.9rem;color:var(--muted);margin-bottom:1rem">
        Choose an available time slot for <strong id="slot-date-label"></strong>:
      </p>
      <div class="slot-grid" id="slot-grid"></div>
      <p id="slot-loading"></p>
      <div class="btn-row">
        <button class="btn-outline" id="slot-back-btn">← Back</button>
        <button class="btn" id="slot-next-btn" disabled>Next →</button>
      </div>
    </div>

    <!-- Step 3: contact details -->
    <div id="contact-section">
      <div class="two-col">
        <div class="field">
          <label for="c-name">Full name</label>
          <input type="text" id="c-name" placeholder="Jane Smith" required />
        </div>
        <div class="field">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" placeholder="jane@example.com" required />
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-outline" id="contact-back-btn">← Back</button>
        <button class="btn" id="contact-next-btn">Review →</button>
      </div>
    </div>

    <!-- Step 4: summary + submit -->
    <div id="summary-section">
      <div class="summary-line"><span class="lbl">Service</span><span id="sum-service"></span></div>
      <div class="summary-line"><span class="lbl">Date</span><span id="sum-date"></span></div>
      <div class="summary-line"><span class="lbl">Time</span><span id="sum-time"></span></div>
      <div class="summary-line"><span class="lbl">Name</span><span id="sum-name"></span></div>
      <div class="summary-line"><span class="lbl">Email</span><span id="sum-email"></span></div>
      <div class="btn-row">
        <button class="btn-outline" id="summary-back-btn">← Back</button>
        <button class="btn" id="submit-btn">Confirm booking →</button>
      </div>
      <div id="book-msg" class="msg"></div>
    </div>

  </div>
</div>

<footer>Powered by Drift · <a href="cancel.html" style="color:inherit">Cancel a booking</a></footer>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let selectedDate = '', selectedSlot = '';

// ── Step helpers ───────────────────────────────────────────────────────────
function showStep(n) {
  ['date-section','slot-section','contact-section','summary-section'].forEach((id, i) => {
    document.getElementById(id).style.display = (i === n - 1) ? '' : 'none';
  });
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step-' + i);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  }
}

// ── Step 1 → 2 ─────────────────────────────────────────────────────────────
document.getElementById('date-input').min = new Date().toISOString().split('T')[0];
document.getElementById('date-next-btn').addEventListener('click', async () => {
  selectedDate = document.getElementById('date-input').value;
  if (!selectedDate) { alert('Please choose a date.'); return; }
  showStep(2);
  document.getElementById('slot-date-label').textContent = selectedDate;
  await loadSlots(selectedDate);
});

async function loadSlots(date) {
  const grid = document.getElementById('slot-grid');
  const loading = document.getElementById('slot-loading');
  grid.innerHTML = '';
  loading.textContent = 'Loading available slots…';
  try {
    const res  = await fetch('/api/get-slots?date=' + date);
    const data = await res.json();
    const slots = data?.payload?.slots ?? [];
    loading.textContent = '';
    if (!slots.length) { loading.textContent = 'No slots available on this date.'; return; }
    slots.forEach(slot => {
      const btn = document.createElement('button');
      btn.className = 'slot-btn';
      btn.textContent = slot;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSlot = slot;
        document.getElementById('slot-next-btn').disabled = false;
      });
      grid.appendChild(btn);
    });
  } catch {
    loading.textContent = 'Could not load slots. Please try again.';
  }
}

document.getElementById('slot-back-btn').addEventListener('click', () => showStep(1));
document.getElementById('slot-next-btn').addEventListener('click', () => showStep(3));

// ── Step 3 → 4 ─────────────────────────────────────────────────────────────
document.getElementById('contact-back-btn').addEventListener('click', () => showStep(2));
document.getElementById('contact-next-btn').addEventListener('click', () => {
  const name  = document.getElementById('c-name').value.trim();
  const email = document.getElementById('c-email').value.trim();
  if (!name || !email) { alert('Please fill in your name and email.'); return; }
  document.getElementById('sum-service').textContent = document.getElementById('svc-select').value;
  document.getElementById('sum-date').textContent    = selectedDate;
  document.getElementById('sum-time').textContent    = selectedSlot;
  document.getElementById('sum-name').textContent    = name;
  document.getElementById('sum-email').textContent   = email;
  showStep(4);
});

// ── Step 4: submit ─────────────────────────────────────────────────────────
document.getElementById('summary-back-btn').addEventListener('click', () => showStep(3));

const submitBtn = document.getElementById('submit-btn');
const bookMsg   = document.getElementById('book-msg');

submitBtn.addEventListener('click', async () => {
  submitBtn.disabled    = true;
  submitBtn.textContent = 'Booking…';

  const payload = {
    name:      document.getElementById('c-name').value.trim(),
    email:     document.getElementById('c-email').value.trim(),
    date:      selectedDate,
    time_slot: selectedSlot,
    service:   document.getElementById('svc-select').value,
  };

  try {
    const res  = await fetch('/api/book-slot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok) {
      bookMsg.textContent = data.payload?.message ?? 'Booking confirmed!';
      bookMsg.className   = 'msg show success';
      submitBtn.style.display = 'none';
      document.getElementById('summary-back-btn').style.display = 'none';
    } else {
      bookMsg.textContent = data.payload?.error ?? 'Something went wrong.';
      bookMsg.className   = 'msg show error';
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Confirm booking →';
    }
  } catch {
    bookMsg.textContent   = 'Could not reach the server. Please try again.';
    bookMsg.className     = 'msg show error';
    submitBtn.disabled    = false;
    submitBtn.textContent = 'Confirm booking →';
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
showStep(1);
</script>
</body>
</html>
